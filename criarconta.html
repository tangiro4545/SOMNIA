<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta</title>
<link rel="stylesheet" href="./css/criarconta.css">
<link rel="shortcut icon" href="./img/icone-somnia.png" type="image/x-icon">
</head>

<body>

<main>

    <section>

        <div class="logo-div">
            <img id="logo" src="./img/logo-somnia.png" alt="">
        </div>

        <form action="./sobre.html">

            <h1>Criar Conta</h1>

            <label>Nome Completo</label>
            <input type="text" required placeholder="Digite seu nome">

            <label>Email</label>
            <input type="email" required placeholder="Digite seu email">

            <label>Senha</label>
            <input type="password" required placeholder="Digite sua senha">

            <label>Confirmar Senha</label>
            <input type="password" required placeholder="Confirme sua senha">

            <button>Criar Conta</button>

        </form>

        <p class="criar-conta">
            possui uma conta?
            <a href="login.html">Entrar</a>
        </p>
    </section>

</main>

</body>
</html>
