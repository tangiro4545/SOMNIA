<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer login</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="shortcut icon" href="" type="image/x-icon">
</head>
<body>
    <main>
        <img id="fundo" src="./img/cidade-fundo.jpg" alt="CIDADE">
        <section>
            <div class="logo-div">
               <img id="logo" src="./img/logo-somnia.png" alt="">
            </div>
            <div>  
                <form action="./sobre.html">
                  
                    <h1>Fazer Login</h1>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu email">
          
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" minlength="8" required placeholder="Digite sua senha">

                    <button>Entrar</button>
                </form>
        
                
                <p class="criar-conta">
                    Não possui uma conta?
                    <a href="criarconta.html">Criar conta</a>
                </p>
            </div> 
        </section>
    </main>
</body>
</html>
